<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="自動化整理每月支出的 Google Sheets 記帳看板">
    <title>每月支出自動整理</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Monthly Expense Automation</p>
          <h1>每月支出自動整理</h1>
        </div>
        <label class="month-picker">
          <span>查詢月份</span>
          <input id="monthInput" type="month" aria-label="查詢月份">
        </label>
      </header>

      <section class="dashboard-grid" aria-label="支出統計看板">
        <article class="metric-panel">
          <span class="panel-label">本月目前總支出</span>
          <strong id="totalAmount">NT$0</strong>
          <small id="expenseCount">0 筆紀錄</small>
        </article>

        <article class="metric-panel">
          <span class="panel-label">高額支出</span>
          <strong id="highExpenseCount">0</strong>
          <small id="thresholdText">門檻載入中</small>
        </article>

        <article class="ratio-panel">
          <div class="panel-heading">
            <div>
              <span class="panel-label">各類別占比</span>
              <p class="panel-subtitle">依照 Google Sheets 中的資料即時整理</p>
            </div>
            <button id="refreshButton" class="ghost-button" type="button">重新整理</button>
          </div>
          <div id="categoryBreakdown" class="category-list"></div>
        </article>
      </section>

      <section class="workspace-grid">
        <form id="expenseForm" class="expense-form">
          <div class="panel-heading">
            <div>
              <h2>快速新增支出</h2>
              <p class="panel-subtitle">送出後會寫入 Google Sheets</p>
            </div>
            <span id="formStatus" role="status" aria-live="polite"></span>
          </div>

          <div class="form-grid">
            <label>
              <span>日期</span>
              <input name="date" type="date" required>
            </label>

            <label>
              <span>金額</span>
              <input name="amount" type="number" min="1" step="1" inputmode="decimal" placeholder="例如 120" required>
            </label>

            <label>
              <span>類別</span>
              <select name="category" required>
                <option value="">選擇類別</option>
                <option value="餐飲">餐飲</option>
                <option value="交通">交通</option>
                <option value="購物">購物</option>
                <option value="娛樂">娛樂</option>
                <option value="居家">居家</option>
                <option value="醫療">醫療</option>
                <option value="學習">學習</option>
                <option value="訂閱">訂閱</option>
                <option value="其他">其他</option>
              </select>
            </label>

            <label>
              <span>付款方式</span>
              <input name="paymentMethod" type="text" placeholder="信用卡、現金、轉帳">
            </label>

            <label>
              <span>商家</span>
              <input name="vendor" type="text" placeholder="店名或平台">
            </label>

            <label class="wide">
              <span>備註</span>
              <input name="note" type="text" placeholder="可留空">
            </label>
          </div>

          <button class="primary-action" type="submit">加入支出</button>
        </form>

        <section class="recent-panel" aria-label="本月支出紀錄">
          <div class="panel-heading">
            <div>
              <h2>本月紀錄</h2>
              <p class="panel-subtitle">高額支出會以醒目顏色標示</p>
            </div>
            <span id="lastUpdated"></span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>類別</th>
                  <th>金額</th>
                  <th>備註</th>
                </tr>
              </thead>
              <tbody id="expenseRows">
                <tr>
                  <td colspan="4" class="empty-state">資料載入中</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
